services:
  irongate:
    container_name: irongate
    build: 
      context: ./
      dockerfile: Dockerfile
    restart: always
    ports: 
      - "${PORT}:3000"
    healthcheck:
      test: ["CMD-SHELL", "bun --eval \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1))\""]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - app-network
    env_file:
      - ./.env
  
  k6:
    image: grafana/k6
    container_name: k6
    networks:
      - app-network
    volumes:
      - ./k6:/scripts
    command: run /scripts/load-test.js
    depends_on:
      irongate:
        condition: service_healthy
    environment:
      - API_TOKEN=${API_TOKEN}

networks:
  app-network:
    driver: bridge
