services:

  irongate:
    container_name: irongate
    build: 
      context: ./
      dockerfile: Dockerfile
    restart: always
    ports: 
      - "${PORT}:3000"
    healthcheck:
      test: ["CMD-SHELL", "bun --eval \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1))\""]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - app-network
    env_file:
      - ./.env
  
  k6:
    image: grafana/k6
    container_name: k6
    networks:
      - app-network
    volumes:
      - ./k6:/scripts
    command: run /scripts/stress-test.js
    depends_on:
      influxdb: 
        condition: service_healthy
      irongate:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
    extra_hosts:
      - "host.docker.internal:host-gateway"

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    env_file:
      - ./.env
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GF_PORT}:3000"
    env_file:
      - ./.env
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  influxdb-data:
  grafana-data:


networks:
  app-network:
    driver: bridge
